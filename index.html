<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OUTPOST — Scav Command</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14160F">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Outpost">
<style>
:root {
  --bg: #0D0F0C;
  --bg-panel: #14160F;
  --bg-panel-raised: #1A1D15;
  --bone: #C9C2A8;
  --bone-dim: #8A8470;
  --olive: #4A5D3A;
  --olive-bright: #6B8550;
  --rust: #A8341F;
  --rust-bright: #D4502F;
  --brass: #8C7A3D;
  --brass-bright: #C2A94F;
  --gunmetal: #3A4A4D;
  --gunmetal-bright: #54696C;
  --border: #2A2D22;
  /* No external font CDN — the game needs to work fully offline once
     installed (see manifest.json/service worker), so this relies on
     fonts every Android/desktop browser already ships rather than a
     network fetch on every cold load. 'Arial Narrow' is condensed and
     uppercase-heavy, a reasonable stand-in for Oswald's display feel;
     'Courier New' covers the monospace body/UI text the same way
     JetBrains Mono did. */
  --font-display: 'Arial Narrow', 'Oswald', sans-serif;
  --font-mono: 'Courier New', 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at top, rgba(74,93,58,0.08), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, transparent 1px, transparent 2px);
  color: var(--bone);
  font-family: var(--font-mono);
  font-size: 14.5px;
  line-height: 1.5;
  min-height: 100vh;
  padding: 0;
  /* Paired with viewport-fit=cover in the viewport meta tag — on a
     phone with a notch/camera cutout or a gesture nav bar, this keeps
     the app's own content clear of those system-reserved edges instead
     of letting them overlap the header or bottom buttons. env() falls
     back to 0 on any device without an inset to report, so this is a
     no-op everywhere else, including desktop. */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

::selection { background: var(--brass); color: var(--bg); }

/* Every full-screen overlay below uses position:fixed; inset:0 — fixed
   positioning is relative to the viewport, not body, so body's own
   safe-area padding (above) never reaches these. calc() adds the
   safe-area inset on TOP of whatever padding each screen already has
   (several, like .modal-overlay, already set their own padding) rather
   than overwriting it outright — on a device with no inset to report,
   env() resolves to 0px and this is a complete no-op, leaving every
   screen's original padding exactly as it was. */
.modal-overlay { padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left)); }
.raid-select-screen, .char-screen, .infirmary-screen,
.barracks-screen, .workshop-screen, .roster-screen, .codex-screen,
.skill-tree-screen {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-panel); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--olive); }

.app {
  max-width: 1800px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 2px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.logo {
  font-family: var(--font-display);
  font-size: 31.5px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--bone);
  text-transform: uppercase;
  position: relative;
}
.logo::after {
  content: 'CAMP COMMAND';
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--brass);
  font-weight: 400;
  margin-top: -2px;
}
.header-stats {
  display: flex;
  gap: 20px;
  font-size: 13.5px;
  align-items: center;
}
.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--bone-dim);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.3s;
  padding: 0;
}
.icon-btn:hover {
  border-color: var(--brass);
  color: var(--brass-bright);
  transform: rotate(20deg);
}
.icon-btn:focus-visible {
  outline: 2px solid var(--brass-bright);
  outline-offset: 2px;
}
.header-btn {
  font-family: var(--font-display);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--bone-dim);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.header-btn:hover { border-color: var(--brass); color: var(--brass-bright); background: var(--bg-panel-raised); }
.header-btn:focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 2px; }
.header-btn.mobile-stash-btn { display: none; } /* shown only below 1000px, where the campfire chest is hidden */

.roster-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--bone-dim);
  letter-spacing: 0;
  text-transform: none;
}

/* ===== RADIO LOG (active raids ticker) ===== */
.radio-log {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--olive);
  margin-bottom: 14px;
  min-height: 0;
  overflow: hidden;
  transition: min-height 0.3s ease;
}
.radio-log.empty { display: none; }
.radio-log-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--olive-bright);
  text-transform: uppercase;
}
.radio-log-header .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--olive-bright);
  animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.radio-entries { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
.radio-entry {
  display: grid;
  grid-template-columns: 110px 1fr 170px;
  gap: 12px;
  align-items: center;
  font-size: 13.5px;
}
.radio-entry .who { color: var(--brass-bright); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.radio-entry .bar-track {
  height: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.radio-entry .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--olive), var(--olive-bright));
  transition: width 0.3s linear;
}
.radio-entry .eta { color: var(--bone-dim); text-align: right; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== MAIN GRID ===== */
.main-grid {
  display: flex;
  align-items: stretch;
}
.left-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 400px;
  flex-shrink: 0;
}
@media (max-width: 1000px) {
  .left-stack { width: 100%; }
}
/* Below ~840px there's no longer room for the 400px-wide sidebar and the
   campfire scene's 320px floor to share a row without forcing horizontal
   overflow — this is the actual phone-width fix: stack them vertically
   instead, same as every other two-pane screen in the game already does
   at its own breakpoint (see .rs-body, .char-body, etc. below). */
@media (max-width: 840px) {
  .main-grid { flex-direction: column; }
  .left-stack { width: 100%; order: 2; }
  .campfire-scene { width: 100%; min-height: 420px; order: 1; }
}

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
}
.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 14.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bone);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-panel-raised);
}
.panel-body { padding: 12px; }
.panel-body.tight { padding: 0; }

.stash-item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.stash-item-row:last-child { border-bottom: none; }
.stash-item-name { font-size: 12.5px; color: var(--bone); }
.stash-item-name.unique { color: var(--brass-bright); }
.stash-item-stat { display: block; font-size: 10px; color: var(--bone-dim); margin-top: 1px; }
.stash-item-count { font-size: 15.5px; font-weight: 700; font-family: var(--font-display); color: var(--brass-bright); }

.raidlog-list { display: flex; flex-direction: column; gap: 0; }
.raidlog-modal-scroll { max-height: 50vh; overflow-y: auto; }
.raidlog-row {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.raidlog-row:last-child { border-bottom: none; }
.raidlog-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}
.raidlog-scav {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
}
.raidlog-status {
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid currentColor;
}
.raidlog-status.success { color: var(--olive-bright); }
.raidlog-status.hurt { color: var(--brass-bright); }
.raidlog-status.death { color: var(--rust-bright); }
.raidlog-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--bone-dim);
}
.raidlog-details {
  font-size: 11px;
  color: var(--brass-bright);
  margin-top: 4px;
}

/* ===== ROSTER ===== */
.scav-card {
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 10px;
  margin-bottom: 8px;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.scav-card:last-child { margin-bottom: 0; }
.scav-card.away { opacity: 0.45; }
.scav-card.dead { display: none; }
.scav-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.scav-name {
  font-family: var(--font-display);
  font-size: 15.5px;
  letter-spacing: 0.5px;
  color: var(--bone);
  text-transform: uppercase;
}
.scav-name .lvl { color: var(--brass-bright); font-size: 12.5px; font-family: var(--font-mono); margin-left: 6px; }
.scav-status {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid currentColor;
}
.scav-status.ready { color: var(--olive-bright); }
.scav-status.away { color: var(--brass); }
.scav-status.hurt { color: var(--rust-bright); }
.scav-status.defending { color: var(--rust-bright); }
.scav-status.healing { color: var(--gunmetal-bright); }
.scav-status.resting { color: var(--brass-bright); }
.hp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.hp-bar-track { flex: 1; height: 5px; background: var(--bg); border: 1px solid var(--border); }
.hp-bar-fill { height: 100%; background: var(--rust); transition: width 0.3s; }
.hp-bar-fill.healthy { background: var(--olive-bright); }
.hp-bar-fill.mid { background: var(--brass); }
.hp-label { font-size: 11px; color: var(--bone-dim); width: 38px; text-align: right; }
.scav-stats-row {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: var(--bone-dim);
  margin-top: 6px;
}
.scav-stats-row span b { color: var(--bone); font-weight: 600; }
.scav-flags-row { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.scav-flag {
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.scav-flag.rad-flag { border: 1px solid #8fae2f; color: #8fae2f; }
.scav-flag.morale-flag { border: 1px solid var(--brass); color: var(--brass-bright); }
.scav-gear-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.gear-tag {
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg);
  border: 1px solid var(--gunmetal-bright);
  color: var(--gunmetal-bright);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.scav-loadout-btn {
  width: 100%;
  margin-top: 10px;
  padding: 6px 10px;
  font-size: 11px;
  letter-spacing: 1px;
}

/* ===== LOADOUT / GEAR PICKER (used in raid select screen + settings) ===== */
.launch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12.5px; }
.launch-row .lbl { color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }

.gear-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.gear-opt {
  font-size: 11px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--bone-dim);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.gear-opt:hover { border-color: var(--gunmetal-bright); }
.gear-opt.active { border-color: var(--brass-bright); color: var(--brass-bright); background: #1F1C12; }
.gear-opt.disabled { opacity: 0.35; cursor: not-allowed; }

.settings-box { max-width: 480px; max-height: 85vh; }
.settings-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel-raised);
}
.settings-tab {
  flex: 1;
  font-family: var(--font-display);
  font-size: 12.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--bone-dim);
  padding: 10px 8px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.settings-tab:hover { color: var(--bone); }
.settings-tab.active { color: var(--brass-bright); border-bottom-color: var(--brass-bright); }
.settings-tab-panel { max-height: 50vh; overflow-y: auto; }

.patch-notes-scroll { display: flex; flex-direction: column; gap: 16px; }
.patch-entry { border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.patch-entry:last-child { border-bottom: none; padding-bottom: 0; }
.patch-entry-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.patch-version {
  font-family: var(--font-display);
  font-size: 15.5px;
  letter-spacing: 1px;
  color: var(--bone);
}
.patch-latest-tag {
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--olive-bright);
  border: 1px solid var(--olive-bright);
  padding: 1px 6px;
}
.patch-notes-list {
  margin: 0;
  padding-left: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.patch-notes-list li {
  font-size: 13px;
  color: var(--bone-dim);
  line-height: 1.5;
}

.settings-notice {
  font-size: 12.5px;
  color: var(--brass-bright);
  background: rgba(140,122,61,0.1);
  border: 1px solid var(--brass);
  padding: 8px 10px;
  margin-bottom: 14px;
  line-height: 1.5;
}
.res-opt { flex: 1 0 calc(33% - 4px); text-align: center; }

.btn {
  font-family: var(--font-display);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-size: 14.5px;
  font-weight: 600;
  padding: 11px 16px;
  border: 1px solid var(--brass);
  background: var(--brass);
  color: var(--bg);
  cursor: pointer;
  width: 100%;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
}
.btn:hover:not(:disabled) { background: var(--brass-bright); border-color: var(--brass-bright); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--gunmetal); border-color: var(--gunmetal); color: var(--bone-dim); }
.btn.secondary { background: transparent; color: var(--bone); border-color: var(--border); }
.btn.secondary:hover:not(:disabled) { border-color: var(--bone-dim); background: var(--bg-panel-raised); }
.btn.danger { background: var(--rust); border-color: var(--rust); }
.btn.danger:hover:not(:disabled) { background: var(--rust-bright); border-color: var(--rust-bright); }

.upgrade-card {
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 10px;
  margin-top: 10px;
}
.upgrade-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.upgrade-name { font-family: var(--font-display); font-size: 14.5px; text-transform: uppercase; letter-spacing: 0.5px; }
.upgrade-lvl { font-size: 11px; color: var(--brass-bright); }
.upgrade-desc { font-size: 12px; color: var(--bone-dim); margin-bottom: 8px; line-height: 1.4; }
.upgrade-cost { font-size: 11px; color: var(--bone-dim); margin-bottom: 8px; }
.upgrade-cost .afford { color: var(--olive-bright); }
.upgrade-cost .short { color: var(--rust-bright); }
.building-popup-card { margin-top: 0; }
.building-popup-lore {
  font-size: 12px;
  font-style: italic;
  color: var(--bone-dim);
  border-left: 2px solid var(--border);
  padding-left: 8px;
  margin-bottom: 10px;
  line-height: 1.5;
}

/* ===== FLEA MARKET ===== */
.flea-offer-card { margin-top: 10px; }
.flea-offer-line {
  font-size: 12px;
  font-style: italic;
  color: var(--bone-dim);
  margin-bottom: 10px;
  line-height: 1.4;
}
.flea-offer-trade {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.flea-offer-side { flex: 1; font-size: 12.5px; }
.flea-offer-side-label {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--bone-dim);
  margin-bottom: 2px;
}
.flea-offer-arrow { color: var(--bone-dim); font-size: 14px; flex-shrink: 0; }
.flea-offer-get { color: var(--olive-bright); font-weight: 600; }
.flea-offer-missing { color: var(--rust-bright); }

/* ===== FIELD REPORT MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,6,4,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 180;
  padding: 20px;
}
.modal-box {
  background: var(--bg-panel);
  border: 1px solid var(--brass);
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-display);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 15.5px;
  background: var(--bg-panel-raised);
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rust-bright); }
.modal-log {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
  font-size: 14px;
  line-height: 1.8;
  min-height: 160px;
}
.log-line { opacity: 0; animation: fadeIn 0.4s forwards; margin-bottom: 6px; }
.log-line .ts { color: var(--bone-dim); margin-right: 8px; }
@keyframes fadeIn { to { opacity: 1; } }
.modal-result {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-panel-raised);
}
.result-title {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-title.success { color: var(--olive-bright); }
.result-title.hurt { color: var(--brass-bright); }
.result-title.death { color: var(--rust-bright); }
.loot-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.loot-item {
  font-size: 12.5px;
  padding: 4px 8px;
  border: 1px solid var(--brass);
  color: var(--brass-bright);
  background: rgba(140,122,61,0.1);
}

.gear-find-banner {
  font-size: 13px;
  color: var(--bone);
  border: 1px solid var(--olive-bright);
  background: rgba(107,133,80,0.12);
  padding: 8px 10px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.gear-find-banner b { color: var(--olive-bright); }
.gear-find-banner .gf-tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--olive-bright);
  padding: 1px 6px;
  margin-right: 6px;
  vertical-align: middle;
}

.boss-drop-banner {
  font-size: 13px;
  color: var(--bone);
  border: 1px solid var(--brass-bright);
  background: rgba(194,169,79,0.14);
  padding: 8px 10px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.boss-drop-banner b { color: var(--brass-bright); }
.boss-drop-banner .bd-tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--bg);
  background: var(--brass-bright);
  padding: 1px 6px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ===== TOAST ===== */
.toast-wrap {
  position: fixed;
  bottom: calc(16px + env(safe-area-inset-bottom));
  right: calc(16px + env(safe-area-inset-right));
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
  max-width: 320px;
}
.toast {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--brass);
  padding: 10px 12px;
  font-size: 13px;
  animation: slideIn 0.25s ease;
}
.toast.death-toast { border-left-color: var(--rust); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.empty-note {
  font-size: 12.5px;
  color: var(--bone-dim);
  text-align: center;
  padding: 20px 10px;
  font-style: italic;
}

.section-divider {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bone-dim);
  margin: 14px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

/* ===== RAID SELECT — SEND-A-RAID LAUNCHER CARD (in main grid) ===== */
.raid-launcher-card {
  text-align: center;
  padding: 30px 16px;
}
.raid-launcher-card .rl-status {
  font-size: 12.5px;
  color: var(--bone-dim);
  margin-bottom: 16px;
}
.raid-launcher-card .rl-status b { color: var(--brass-bright); }

/* ===== RAID SELECT — FULL SCREEN OVERLAY ===== */
.raid-select-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
@keyframes raidScreenIn { from { opacity: 0; } to { opacity: 1; } }

.rs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
.rs-header .rs-title {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.rs-header .rs-title span {
  color: var(--brass-bright);
}
.rs-back-btn {
  font-family: var(--font-display);
  font-size: 12.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--bone-dim);
  padding: 8px 14px;
  cursor: pointer;
}
.rs-back-btn:hover { border-color: var(--bone-dim); color: var(--bone); }

/* Tarkov-style dot map: one big region image, a button per site */
.rs-map-stage {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.rs-map-canvas {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}
.rs-map-dot {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 2;
}
.rs-map-dot-core {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--bg-panel-raised);
  border: 2px solid var(--olive-bright);
  box-shadow: 0 0 0 4px rgba(140,122,61,0.12);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.rs-map-dot.med .rs-map-dot-core { border-color: var(--brass-bright); box-shadow: 0 0 0 4px rgba(194,169,79,0.14); }
.rs-map-dot.high .rs-map-dot-core, .rs-map-dot.extreme .rs-map-dot-core { border-color: var(--rust-bright); box-shadow: 0 0 0 4px rgba(168,52,31,0.16); }
.rs-map-dot:hover .rs-map-dot-core { transform: scale(1.25); }
.rs-map-dot.active .rs-map-dot-core { transform: scale(1.35); box-shadow: 0 0 0 6px rgba(194,169,79,0.25); }
.rs-map-dot.locked { cursor: not-allowed; }
.rs-map-dot.locked .rs-map-dot-core { border-color: var(--border); background: rgba(13,15,12,0.7); box-shadow: none; opacity: 0.7; }
.rs-map-dot-label {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone-dim);
  white-space: nowrap;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  transition: color 0.15s;
}
.rs-map-dot:hover .rs-map-dot-label, .rs-map-dot.active .rs-map-dot-label { color: var(--bone); }
.rs-map-dot.locked .rs-map-dot-label { color: var(--bone-dim); opacity: 0.6; }

/* side popup: hidden until a dot is picked, then slides in from the right */
.rs-side-popup {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 460px;
  max-width: 92vw;
  background: var(--bg);
  border-left: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.2s ease;
  z-index: 3;
}
.rs-side-popup.open { transform: translateX(0); }
.rs-popup-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13,15,12,0.7);
  border: 1px solid var(--border);
  color: var(--bone-dim);
  cursor: pointer;
  font-size: 13px;
  z-index: 4;
}
.rs-popup-close:hover { color: var(--bone); border-color: var(--bone-dim); }
.rs-popup-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.rs-popup-scroll .rs-art-panel { border-right: none; min-height: 220px; }
.rs-popup-scroll .rs-art-name { font-size: 26px; }
.rs-popup-scroll .rs-art-desc { max-width: none; }

.rs-art-panel {
  position: relative;
  background-size: cover;
  background-position: center;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px;
}
.rs-art-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(13,15,12,0) 30%, rgba(13,15,12,0.92) 100%);
}
.rs-art-content { position: relative; z-index: 1; }
.rs-art-name {
  font-family: var(--font-display);
  font-size: 33.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--bone);
  line-height: 1.1;
}
.rs-art-desc {
  font-size: 14px;
  color: var(--bone-dim);
  max-width: 460px;
  margin-top: 8px;
  line-height: 1.5;
}
.rs-art-meta {
  display: flex;
  gap: 22px;
  margin-top: 14px;
  font-size: 12.5px;
}
.rs-art-meta .m-lbl { color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; display: block; }
.rs-art-meta .m-val { font-size: 17px; font-weight: 700; color: var(--brass-bright); }

/* Barracks' main body: big art panel + side info, side by side. The new
   dot-map popup doesn't use this — it stacks art-panel above info-panel
   in a single scrolling column instead (see .rs-popup-scroll). */
.rs-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 0;
  overflow: hidden;
  min-height: 0;
}

.rs-info-panel {
  overflow-y: auto;
  padding: 20px;
}

.rs-scav-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 4px;
}
.rs-scav-pick {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.rs-scav-pick:hover { border-color: var(--olive-bright); }
.rs-scav-pick.active { border-color: var(--brass-bright); background: #1F1C12; }
.rs-scav-pick.unavailable { opacity: 0.4; cursor: not-allowed; }
.rs-scav-pick .rsp-name { font-family: var(--font-display); font-size: 14px; text-transform: uppercase; }
.rs-scav-pick .rsp-name .lvl { color: var(--brass-bright); font-size: 11px; margin-left: 5px; }
.rs-scav-pick .rsp-hp { font-size: 11px; color: var(--bone-dim); }

.event-warning {
  font-size: 11.5px;
  color: var(--rust-bright);
  background: rgba(168,52,31,0.12);
  border: 1px solid var(--rust);
  padding: 10px;
  margin-bottom: 14px;
  line-height: 1.5;
}
.defend-pick-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
.defend-pick {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.defend-pick:hover { border-color: var(--rust); }
.defend-pick.active { border-color: var(--rust-bright); background: rgba(168,52,31,0.12); }
.defend-pick-name { font-family: var(--font-display); font-size: 13px; text-transform: uppercase; }
.defend-pick-name .lvl { color: var(--brass-bright); font-size: 10px; margin-left: 5px; }
.defend-pick-hp { font-size: 10.5px; color: var(--bone-dim); }

.o-item { text-align: center; }
.o-lbl { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--bone-dim); display: block; }
.o-val { font-size: 19px; font-weight: 700; font-family: var(--font-display); }
.o-val.survive { color: var(--olive-bright); }
.o-val.loot { color: var(--brass-bright); }

.defend-odds-row {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  margin-top: 14px;
}
.defend-odds-row .o-item { flex: 1; padding: 8px; border-right: 1px solid var(--border); }
.defend-odds-row .o-item:last-child { border-right: none; }


.rs-loot-table {
  display: flex;
  gap: 16px;
  margin-top: 4px;
}
.rs-loot-table .lt-item { font-size: 12.5px; color: var(--bone-dim); }
.rs-loot-table .lt-item b { color: var(--brass-bright); display: block; font-size: 15.5px; }

.rs-loadout-summary { display: flex; flex-direction: column; gap: 4px; }
.rs-loadout-row {
  display: flex;
  justify-content: space-between;
  font-size: 12.5px;
  padding: 3px 0;
}
.rs-loadout-row .lbl { color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
.rs-loadout-val { color: var(--bone); font-weight: 600; }

.loadout-stats-row {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  margin-bottom: 14px;
}
.loadout-stats-row .ls-item { flex: 1; padding: 8px; text-align: center; border-right: 1px solid var(--border); }
.loadout-stats-row .ls-item:last-child { border-right: none; }
.loadout-stats-row .ls-lbl { font-size: 10px; color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px; display: block; }
.loadout-stats-row .ls-val { font-size: 19px; font-weight: 700; font-family: var(--font-display); color: var(--brass-bright); }

/* bottom prep / confirm bar */
.rs-bottom-bar {
  flex-shrink: 0;
  border-top: 2px solid var(--border);
  background: var(--bg-panel);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.rs-bottom-bar .rs-odds {
  display: flex;
  gap: 18px;
}
.rs-bottom-bar .rs-odds .o-item { text-align: center; }
.rs-bottom-bar .rs-odds .o-lbl { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--bone-dim); display: block; }
.rs-bottom-bar .rs-odds .o-val { font-size: 19px; font-weight: 700; font-family: var(--font-display); }
.rs-bottom-bar .rs-odds .o-val.survive { color: var(--olive-bright); }
.rs-bottom-bar .rs-odds .o-val.loot { color: var(--brass-bright); }
.rs-bottom-bar .btn { flex: 1; }
.rs-bottom-bar .rs-gear-mini { display: flex; gap: 6px; flex-wrap: wrap; max-width: 280px; }

@media (max-width: 900px) {
  .rs-body { grid-template-columns: 1fr; overflow-y: auto; }
  .rs-art-panel { min-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
  .rs-bottom-bar { flex-wrap: wrap; }
  .rs-bottom-bar .btn { flex: 1 0 100%; order: 10; }
  .rs-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .rs-header .rs-title { font-size: 17px; letter-spacing: 2px; }
  .rs-back-btn { align-self: flex-end; }
}

/* ===== CHARACTER SCREEN (drag-and-drop loadout) ===== */
.char-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
.char-body {
  flex: 1;
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  gap: 0;
  overflow: hidden;
  min-height: 0;
}
.char-body > section {
  overflow-y: auto;
  padding: 18px;
}
.char-portrait-col {
  border-right: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.char-portrait-art {
  width: 120px;
  height: 120px;
  border: 2px solid var(--brass);
  background: var(--bg-panel-raised);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brass-bright);
  margin-bottom: 14px;
  position: relative;
}
.char-portrait-art::after {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid var(--border);
}
.char-portrait-name {
  font-family: var(--font-display);
  font-size: 19px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--bone);
}
.char-portrait-name .lvl { color: var(--brass-bright); font-size: 13px; font-family: var(--font-mono); margin-left: 6px; }
.char-portrait-status {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--bone-dim);
  margin-top: 2px;
  margin-bottom: 14px;
}
.char-hp-row { width: 100%; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.char-hp-row .hp-label { width: auto; white-space: nowrap; }
.hp-rad-note { color: var(--rust-bright); font-size: 10px; font-weight: 400; }
.char-secondary-row { width: 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.char-secondary-row:last-of-type { margin-bottom: 18px; }
.char-secondary-track { flex: 1; height: 5px; background: var(--bg); border: 1px solid var(--border); position: relative; overflow: hidden; }
.char-secondary-fill { height: 100%; transition: width 0.3s linear; }
.char-secondary-fill.rad-fill { background: linear-gradient(90deg, #4a5c1f, #8fae2f); }
.char-secondary-fill.morale-fill { background: linear-gradient(90deg, var(--gunmetal), var(--brass-bright)); }
.char-secondary-label { font-size: 10.5px; color: var(--bone-dim); white-space: nowrap; flex-shrink: 0; }
.char-stats-stack { width: 100%; display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); margin-bottom: 16px; }
.char-stats-stack .cs-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--border); }
.char-stats-stack .cs-item:last-child { border-bottom: none; }
.char-stats-stack .cs-lbl { font-size: 11px; color: var(--bone-dim); text-transform: uppercase; letter-spacing: 1px; }
.char-stats-stack .cs-val { font-size: 15px; font-weight: 700; font-family: var(--font-display); color: var(--brass-bright); }
.char-xp-note { font-size: 11px; color: var(--bone-dim); }

.char-equip-col {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.equip-slot {
  width: 100%;
  max-width: 320px;
  border: 2px dashed var(--border);
  background: var(--bg-panel);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  position: relative;
}
.equip-slot.drag-over {
  border-color: var(--brass-bright);
  background: #1F1C12;
  transform: scale(1.02);
}
.equip-slot.filled { border-style: solid; border-color: var(--gunmetal-bright); cursor: grab; }
.equip-slot.filled:active { cursor: grabbing; }
.equip-slot-icon {
  width: 42px;
  height: 42px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  color: var(--brass-bright);
}
.equip-slot-body { flex: 1; min-width: 0; }
.equip-slot-label { font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--bone-dim); margin-bottom: 2px; }
.equip-slot-name { font-family: var(--font-display); font-size: 14.5px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--bone); }
.equip-slot-stat { font-size: 11px; color: var(--brass-bright); margin-top: 2px; }
.equip-slot-empty-hint { font-size: 10.5px; color: var(--bone-dim); font-style: italic; }
.equip-slot-clear-btn {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--bone-dim);
  cursor: pointer;
  font-size: 13px;
}
.equip-slot-clear-btn:hover { border-color: var(--rust-bright); color: var(--rust-bright); }
.char-equip-hint {
  font-size: 11.5px;
  color: var(--bone-dim);
  text-align: center;
  max-width: 320px;
  line-height: 1.5;
}

.char-stash-col {
  border-left: 1px solid var(--border);
  background: var(--bg-panel);
}
.char-stash-tabs { display: flex; border-bottom: 1px solid var(--border); margin: -18px -18px 14px; }
.char-stash-tab {
  flex: 1;
  font-family: var(--font-display);
  font-size: 11.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: var(--bg-panel-raised);
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--bone-dim);
  padding: 10px 6px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.char-stash-tab:hover { color: var(--bone); }
.char-stash-tab.active { color: var(--brass-bright); border-bottom-color: var(--brass-bright); }
.char-stash-grid { display: flex; flex-direction: column; gap: 6px; }
.char-item-tile {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 8px 10px;
  cursor: grab;
  transition: border-color 0.15s, background 0.15s;
}
.char-item-tile:hover { border-color: var(--brass); }
.char-item-tile:active { cursor: grabbing; }
.char-item-tile.equipped { border-color: var(--brass-bright); background: #1F1C12; cursor: default; }
.char-item-tile.unavailable { opacity: 0.35; cursor: not-allowed; }
.char-item-tile.dragging { opacity: 0.3; }
.char-item-icon {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--gunmetal-bright);
}
.char-item-tile.t1 .char-item-icon { color: var(--bone-dim); }
.char-item-tile.t2 .char-item-icon { color: var(--olive-bright); }
.char-item-tile.t3 .char-item-icon { color: var(--brass-bright); }
.char-item-tile.t4 .char-item-icon { color: var(--rust-bright); }
.char-item-tile.unique { border-color: var(--brass-bright); background: rgba(194,169,79,0.08); }
.char-item-tile.unique .char-item-icon { color: var(--brass-bright); }
.char-item-tile.unique .char-item-name { color: var(--brass-bright); }
.char-item-tile.unique.equipped { background: #1F1C12; }
.char-item-body { flex: 1; min-width: 0; }
.char-item-name { font-size: 12.5px; color: var(--bone); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-item-stat { font-size: 10px; color: var(--bone-dim); }
.char-item-count { font-size: 13.5px; font-weight: 700; font-family: var(--font-display); color: var(--brass-bright); flex-shrink: 0; }
.char-item-equipped-tag {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--brass-bright);
  flex-shrink: 0;
}

.char-stash-dropzone.drag-over {
  outline: 2px dashed var(--rust-bright);
  outline-offset: -2px;
  background: rgba(168,52,31,0.06);
}

@media (max-width: 1000px) {
  .char-body { grid-template-columns: 1fr; overflow-y: auto; }
  .char-portrait-col, .char-equip-col, .char-stash-col { border: none; border-bottom: 1px solid var(--border); }
}

/* ===== INFIRMARY (heal-over-time) ===== */
.heal-row { display: flex; align-items: center; gap: 6px; margin: 4px 0 6px; }
.heal-bar-track { flex: 1; height: 5px; background: var(--bg); border: 1px solid var(--border); position: relative; overflow: hidden; }
.heal-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gunmetal), var(--gunmetal-bright)); transition: width 0.3s linear; }
.heal-bar-fill.rest-bar-fill { background: linear-gradient(90deg, var(--brass), var(--brass-bright)); }
.heal-eta { font-size: 11px; color: var(--bone-dim); width: 32px; text-align: right; }

.infirmary-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
.infirmary-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  overflow: hidden;
  min-height: 0;
}
.infirmary-col {
  overflow-y: auto;
  padding: 20px;
}
.infirmary-col:first-child { border-right: 1px solid var(--border); background: var(--bg-panel); }
.infirmary-hint { font-size: 12px; color: var(--bone-dim); line-height: 1.5; margin-bottom: 14px; }

.infirmary-queue-list, .infirmary-candidate-list { display: flex; flex-direction: column; gap: 10px; }

.infirmary-bed {
  border: 1px solid var(--gunmetal-bright);
  background: var(--bg-panel-raised);
  padding: 10px 12px;
}
.infirmary-bed-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.infirmary-bed-name {
  font-family: var(--font-display);
  font-size: 13.5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
}
.infirmary-bed-name .lvl { color: var(--brass-bright); font-size: 11px; font-family: var(--font-mono); margin-left: 5px; }
.infirmary-recall-btn {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--bone-dim);
  cursor: pointer;
  font-size: 12px;
  flex-shrink: 0;
}
.infirmary-recall-btn:hover { border-color: var(--rust-bright); color: var(--rust-bright); }
.infirmary-bed-meta {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--bone-dim);
  margin-top: 4px;
}
.infirmary-rad-note {
  font-size: 10.5px;
  color: #8fae2f;
  margin-top: 3px;
}

.infirmary-candidate {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 10px 12px;
}
.infirmary-candidate-info { flex: 1; min-width: 0; }
.infirmary-candidate-eta {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.infirmary-eta-val {
  font-size: 11px;
  color: var(--bone-dim);
  white-space: nowrap;
}
.infirmary-meds-cost {
  font-size: 10.5px;
  font-family: var(--font-mono);
  white-space: nowrap;
}
.infirmary-meds-cost.afford { color: var(--olive-bright); }
.infirmary-meds-cost.short { color: var(--rust-bright); }

@media (max-width: 1000px) {
  .infirmary-body { grid-template-columns: 1fr; overflow-y: auto; }
  .infirmary-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}

/* ===== BARRACKS (group raids) ===== */
.barracks-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}

/* Barracks still uses the older horizontal thumbnail-strip map picker —
   the solo raid screen moved to the dot map below, but group raids keep
   this style for now. */
.rs-strip-wrap {
  flex-shrink: 0;
  padding: 16px 20px 10px;
  border-bottom: 1px solid var(--border);
}
.rs-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
  scroll-snap-type: x proximity;
}
.rs-strip::-webkit-scrollbar { height: 6px; }
.rs-map-card {
  position: relative;
  flex: 0 0 200px;
  height: 112px;
  cursor: pointer;
  border: 2px solid var(--border);
  overflow: hidden;
  scroll-snap-align: start;
  transition: border-color 0.15s, transform 0.15s;
  background-size: cover;
  background-position: center;
}
.rs-map-card:hover { border-color: var(--brass); transform: translateY(-2px); }
.rs-map-card.active { border-color: var(--brass-bright); }
.rs-map-card.locked { cursor: not-allowed; filter: grayscale(0.6) brightness(0.6); }
.rs-map-card .rs-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(13,15,12,0.1) 0%, rgba(13,15,12,0.88) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 8px 10px;
}
.rs-map-card .rs-card-name {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
  line-height: 1.2;
}
.rs-map-card .rs-card-risk {
  position: absolute;
  top: 6px;
  right: 6px;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 5px;
  background: rgba(13,15,12,0.7);
}
.rs-map-card .rs-card-risk.low { color: var(--olive-bright); border: 1px solid var(--olive-bright); }
.rs-map-card .rs-card-risk.med { color: var(--brass-bright); border: 1px solid var(--brass-bright); }
.rs-map-card .rs-card-risk.high,
.rs-map-card .rs-card-risk.extreme { color: var(--rust-bright); border: 1px solid var(--rust-bright); }
.rs-map-card .rs-card-risk.dungeon { color: var(--gunmetal-bright); border: 1px solid var(--gunmetal-bright); }
.rs-map-card .rs-card-lock {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--rust-bright);
  background: rgba(13,15,12,0.55);
  text-align: center;
  padding: 0 10px;
}

/* ===== Raid select screen tabs (Region / Dungeons) ===== */
.rs-tabs {
  display: flex;
  gap: 2px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.rs-tab {
  background: none;
  border: none;
  color: var(--bone-dim);
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 16px 9px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.rs-tab:hover { color: var(--bone); }
.rs-tab.active { color: var(--brass-bright); border-bottom-color: var(--brass-bright); }

/* ===== Dungeons tab ===== */
.dungeon-strip { gap: 14px; }
.rs-map-card.dungeon-card { flex: 0 0 240px; height: 130px; }
.dungeon-key-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  font-size: 10px;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  background: rgba(13,15,12,0.75);
  color: var(--brass-bright);
  border: 1px solid var(--brass);
}
.dungeon-detail {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dungeon-desc {
  font-size: 13px;
  color: var(--bone-dim);
  line-height: 1.5;
  margin-bottom: 10px;
}
.dungeon-note {
  font-size: 12px;
  color: var(--gunmetal-bright);
  line-height: 1.5;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.dungeon-launch-btn { background: var(--gunmetal-bright); border-color: var(--gunmetal-bright); }
.dungeon-launch-btn:hover { background: var(--gunmetal); }


.rs-scav-pick.group-pick { position: relative; }
.rs-scav-pick.group-pick.active { border-color: var(--olive-bright); }
.group-pick-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--olive-bright);
  color: var(--bg);
  font-size: 10.5px;
  font-weight: 700;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  justify-content: center;
}
.rs-scav-pick.group-pick.full-disabled { opacity: 0.4; cursor: not-allowed; }
.rs-scav-pick.full-disabled { opacity: 0.4; cursor: not-allowed; }

.group-slots-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.group-slot {
  flex: 1;
  border: 1px dashed var(--border);
  background: var(--bg-panel);
  padding: 8px 10px;
  font-size: 12px;
  color: var(--bone-dim);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.group-slot.filled {
  border-style: solid;
  border-color: var(--olive-bright);
  background: var(--bg-panel-raised);
  color: var(--bone);
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-transform: none;
  letter-spacing: normal;
}
.group-slot-remove {
  background: none;
  border: none;
  color: var(--bone-dim);
  cursor: pointer;
  font-size: 12px;
  padding: 0 0 0 8px;
}
.group-slot-remove:hover { color: var(--rust-bright); }

.group-bonus-note {
  font-size: 11px;
  color: var(--olive-bright);
  margin: -8px 0 14px;
}

/* ===== RAID EVENTS (mid-raid decision popups) ===== */
.raid-event-meta {
  font-size: 10.5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone-dim);
  margin-bottom: 14px;
}
.raid-event-opt-list { display: flex; flex-direction: column; gap: 8px; }
.raid-event-opt {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  width: 100%;
  text-align: left;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 11px 13px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-family: inherit;
}
.raid-event-opt:hover { border-color: var(--brass-bright); background: #1F1C12; }
.raid-event-opt .reo-label {
  font-family: var(--font-display);
  font-size: 13.5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
}
.raid-event-opt .reo-detail { font-size: 11.5px; color: var(--bone-dim); line-height: 1.4; }
.raid-event-opt .reo-survival {
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--olive-bright);
  margin-top: 2px;
  font-weight: 600;
}

/* ===== BOSS ENCOUNTERS ===== */
.boss-modal-box { border-color: var(--rust); box-shadow: 0 0 24px rgba(168,52,31,0.25); }
.boss-modal-header {
  background: linear-gradient(90deg, rgba(168,52,31,0.18), var(--bg-panel-raised));
  letter-spacing: 2.5px;
}
.boss-modal-header .dot { background: var(--rust-bright); animation: pulse 1s infinite; }
.boss-warning {
  border-color: var(--rust-bright);
  background: rgba(168,52,31,0.16);
}
.boss-opt { border-color: var(--gunmetal-bright); }
.boss-opt:hover { border-color: var(--rust-bright); background: rgba(168,52,31,0.1); }

.boss-result-banner {
  font-size: 13px;
  color: var(--bone);
  border: 1px solid var(--rust-bright);
  background: rgba(168,52,31,0.14);
  padding: 8px 10px;
  margin-bottom: 12px;
  line-height: 1.5;
}
.boss-result-banner.fled { border-color: var(--bone-dim); background: var(--bg-panel-raised); }
.boss-result-banner b { color: var(--rust-bright); }
.boss-result-banner.fled b { color: var(--bone); }
.boss-result-tag {
  display: inline-block;
  font-size: 9.5px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--bg);
  background: var(--rust-bright);
  padding: 2px 6px;
  margin-right: 6px;
  vertical-align: middle;
}
.boss-result-banner.fled .boss-result-tag { background: var(--bone-dim); }

.radio-entry.awaiting { cursor: pointer; }
.radio-entry.awaiting .bar-fill { background: linear-gradient(90deg, var(--rust), var(--rust-bright)); }
.radio-entry.awaiting .who { color: var(--rust-bright); }
.awaiting-tag {
  color: var(--rust-bright);
  font-weight: 600;
  animation: pulse 1.4s infinite;
}
.awaiting-tag.boss-tag { color: var(--rust-bright); font-weight: 700; }
.radio-entry.boss-awaiting { outline: 1px solid var(--rust); }
.radio-entry.boss-awaiting .bar-fill { background: linear-gradient(90deg, var(--rust), var(--rust-bright)); }

/* ===== WORKSHOP (crafting) ===== */
.workshop-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
.workshop-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  max-width: 760px;
}
.workshop-hint {
  font-size: 12px;
  color: var(--bone-dim);
  line-height: 1.5;
  margin-bottom: 18px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 10px 12px;
}
.workshop-recipe-list { display: flex; flex-direction: column; gap: 10px; }
.workshop-recipe {
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 12px 14px;
}
.workshop-recipe.locked { opacity: 0.55; }
.workshop-recipe-icon {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--olive-bright);
}
.workshop-recipe-body { flex: 1; min-width: 0; }
.workshop-recipe-name {
  font-family: var(--font-display);
  font-size: 14.5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
}
.workshop-recipe-stat { font-size: 11.5px; color: var(--brass-bright); margin-top: 2px; }
.workshop-recipe-locked { font-size: 10.5px; color: var(--rust-bright); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.workshop-recipe-side {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}
.workshop-recipe-cost { font-size: 11.5px; font-family: var(--font-mono); }
.workshop-recipe-cost.afford { color: var(--olive-bright); }
.workshop-recipe-cost.short { color: var(--rust-bright); }
.workshop-recipe-count { font-size: 10.5px; color: var(--bone-dim); }

.char-item-tile.improvised .char-item-icon { color: var(--olive-bright); }
.char-item-improvised-tag {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--olive-bright);
  border: 1px solid var(--olive);
  padding: 1px 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.char-item-unique-tag {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--brass-bright);
  border: 1px solid var(--brass);
  padding: 1px 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.equip-slot-improvised-tag {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--olive-bright);
  border: 1px solid var(--olive);
  padding: 1px 4px;
  margin-left: 7px;
  vertical-align: middle;
}
.equip-slot-unique-tag {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--brass-bright);
  border: 1px solid var(--brass);
  padding: 1px 4px;
  margin-left: 7px;
  vertical-align: middle;
}

/* ===== STASH / RAID LOG (read-only side screens) ===== */
.roster-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
.side-screen-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  max-width: 560px;
}
.roster-screen .side-screen-body {
  max-width: 900px;
}
.roster-screen-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  align-items: start;
}

/* ===== CODEX ===== */
.codex-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  animation: raidScreenIn 0.25s ease;
}
.codex-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.codex-tabs {
  flex-shrink: 0;
  width: 160px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  padding: 14px 0;
  gap: 2px;
}
.codex-tab {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: left;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  color: var(--bone-dim);
  padding: 11px 18px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.codex-tab:hover { color: var(--bone); background: var(--bg-panel-raised); }
.codex-tab.active { color: var(--brass-bright); border-left-color: var(--brass-bright); background: var(--bg-panel-raised); }

.codex-page {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  /* a faint warm tint and a ruled left margin, just enough to read as a
     notebook page without clashing with the cold military panels elsewhere */
  background: linear-gradient(90deg, rgba(140,122,61,0.05) 0%, rgba(140,122,61,0.05) 38px, transparent 39px, transparent 100%);
}
.codex-item-section { margin-bottom: 22px; }
.codex-item-section:last-child { margin-bottom: 0; }
.codex-section-label {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--brass-bright);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.codex-entry-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  align-items: start;
}
.codex-locations-list { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
.codex-entry {
  border: 1px solid var(--border);
  background: var(--bg-panel-raised);
  padding: 14px;
  position: relative;
}
.codex-entry-art {
  width: 100%;
  height: 90px;
  background-size: cover;
  background-position: center;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.codex-entry-icon {
  width: 28px;
  height: 28px;
  color: var(--brass-bright);
  margin-bottom: 8px;
}
.codex-building-icon svg { width: 48px; height: auto; }
.codex-entry-name {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--bone);
  margin-bottom: 4px;
}
.codex-improvised-tag {
  display: inline-block;
  font-size: 8px;
  font-family: var(--font-mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--olive-bright);
  border: 1px solid var(--olive);
  padding: 1px 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.codex-unique-tag {
  display: inline-block;
  font-size: 8px;
  font-family: var(--font-mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--brass-bright);
  border: 1px solid var(--brass);
  padding: 1px 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.codex-entry-meta {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--brass-bright);
  text-transform: uppercase;
  letter-spacing: 0.5px;

.cf-stars-twinkle {
  position: absolute;

    radial-gradient(1px 1px at 8% 15%, var(--bone-dim) 50%, transparent 51%),

    radial-gradient(1px 1px at 38% 22%, var(--bone) 50%, transparent 51%),

}
.cf-ground::before {
  content: '';

.cf-buildings {

.cf-clock {

}

.cf-clock-time { color: var(--bone); font-weight: 600; }
.cf-clock-day { color: var(--brass-bright); letter-spacing: 0.5px; }
/* Accent color follows the current phase — same data attribute
   applyDayNightLighting() updates every tick, just a CSS lookup rather
   than another inline style to juggle. */
.cf-clock[data-phase="dawn"] .cf-clock-icon, .cf-clock[data-phase="dusk"] .cf-clock-icon { color: var(--rust-bright); }
.cf-clock[data-phase="day"] .cf-clock-icon { color: var(--brass-bright); }
.cf-clock[data-phase="night"] .cf-clock-icon { color: var(--gunmetal-bright); }


.cf-glow {
  position: absolute;
  left: 50%;
  bottom: 27%;
  width: 280px;
  height: 280px;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(212,80,47,0.30) 0%, rgba(212,80,47,0.12) 35%, transparent 70%);
  animation: cfGlowPulse 2.6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes cfGlowPulse { 0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(0.94); } 50% { opacity: 1; transform: translateX(-50%) scale(1.05); } }

.cf-fire {
  position: absolute;
  left: 50%;
  bottom: 29%;
  transform: translateX(-50%);
  width: 39px;
  height: 51px;
}
.cf-log {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 42px;
  height: 9px;
  background: #2a1d14;
  border: 1px solid #1a120a;
}
.cf-log::before, .cf-log::after {
  content: '';
  position: absolute;
  width: 42px;
  height: 7px;
  background: #2a1d14;
  border: 1px solid #1a120a;
  bottom: 1px;
}
.cf-log::before { left: 15px; transform: rotate(35deg); }
.cf-log::after { left: -15px; transform: rotate(-35deg); }
.cf-flame {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 21px;
  height: 33px;
  background: var(--rust);
  clip-path: polygon(50% 0%, 80% 35%, 65% 40%, 90% 70%, 50% 100%, 10% 70%, 35% 40%, 20% 35%);
  animation: cfFlameA 0.9s steps(2) infinite;
}
.cf-flame.cf-flame-inner {
  width: 12px;
  height: 21px;
  bottom: 8px;

}
@keyframes cfFlameA { 0% { transform: translateX(-50%) scaleY(1) scaleX(1); } 50% { transform: translateX(-50%) scaleY(1.08) scaleX(0.92); } 100% { transform: translateX(-50%) scaleY(1) scaleX(1); } }
@keyframes cfFlameB { 0% { transform: translateX(-50%) scaleY(0.95) scaleX(1.05); } 50% { transform: translateX(-50%) scaleY(1.1) scaleX(0.9); } 100% { transform: translateX(-50%) scaleY(0.95) scaleX(1.05); } }

.cf-embers {
  position: absolute;
  left: 50%;
  bottom: 31%;
  width: 2px;
  height: 2px;
  transform: translateX(-50%);
}
.cf-ember {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--brass-bright);
  opacity: 0;
  animation: cfEmberRise 2.4s linear infinite;
}
.cf-ember:nth-child(1) { left: -6px; animation-delay: 0s; --drift: -8px; }
.cf-ember:nth-child(2) { left: 2px; animation-delay: 0.8s; --drift: 5px; }
.cf-ember:nth-child(3) { left: -2px; animation-delay: 1.6s; --drift: -3px; }
@keyframes cfEmberRise {
  0% { opacity: 0; transform: translate(0, 0); }
  10% { opacity: 1; }
  90% { opacity: 0.4; }
  100% { opacity: 0; transform: translate(var(--drift, 6px), -70px); }

.cf-survivors {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.cf-survivor {
  position: absolute;
  width: 50px;
  height: 94px;
  cursor: pointer;
  pointer-events: auto;
}
.cf-survivor-pose {
  width: 100%;
  height: 100%;
  transform-origin: 50% 100%;

  animation-delay: var(--bob-delay, 0s);
}
.cf-survivor-pose.facing-left { transform: scaleX(-1); }
.cf-survivor-pose.walking { animation: cfWalkBob 0.45s ease-in-out infinite; }
@keyframes cfBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
@keyframes cfWalkBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-1.5px); }
}
.cf-survivor-pose svg { width: 100%; height: 100%; display: block; shape-rendering: crispEdges; }
.cf-leg { transform-box: fill-box; transform-origin: 50% 0%; }

/* Buildings, the chest, the warehouse, and survivors are all sized in
   fixed pixels, positioned with percentage-based left/bottom offsets
   that already shrink to fit a narrower scene on their own — only the
   sprite sizes themselves don't. At the scene's actual phone-width floor
   (420px, see .campfire-scene's 840px breakpoint above), 7 buildings at
   their full 100px width would visibly overlap; scaling every sprite
   down here keeps the same scene readable without touching a single
   position value. */
@media (max-width: 840px) {
  .cf-building svg { width: 64px; }
  .cf-chest svg { width: 52px; }
  .cf-warehouse svg { width: 70px; }
  .cf-survivor { width: 34px; height: 64px; }
}
.cf-survivor-pose.walking .cf-leg-a { animation: cfLegA 0.45s ease-in-out infinite; }
.cf-survivor-pose.walking .cf-leg-b { animation: cfLegB 0.45s ease-in-out infinite; }
@keyframes cfLegA { 0%, 100% { transform: rotate(22deg); } 50% { transform: rotate(-22deg); } }
@keyframes cfLegB { 0%, 100% { transform: rotate(-22deg); } 50% { transform: rotate(22deg); } }
.cf-survivor-label {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  margin-bottom: 4px;
  font-family: var(--font-mono);
  font-size: 9px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.cf-survivor-hp {

/* On a touch-only device, :hover never fires at all — without this,
   a survivor's name and HP would be permanently invisible on Android/

   other way (unlike the buildings, where tapping opens the full popup

@media (hover: none) {

<body>
<div class="app" id="app">Loading outpost…</div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="game.js"></script>
<script>
  // Registered after game.js loads, not before — the service worker
  // caching the app shell has nothing to do with the game actually
  // starting up, and there's no reason to make the very first paint
  // wait on it. Guarded by a feature check since some older/embedded
  // WebViews don't support service workers at all; the game still works
  // fine without one, just without the offline-install benefit.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((err) => {
        console.error("Service worker registration failed:", err);
      });
    });
  }
</script>
